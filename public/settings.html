<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>系统设置</title>
    <link rel="stylesheet" href="/styles.css" />
    <style>
      .settings-section {
        background: #fff;
        padding: 24px;
        border-radius: 12px;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        margin-bottom: 24px;
      }
      .settings-section h2 {
        margin-top: 0;
        margin-bottom: 20px;
        font-size: 18px;
        border-bottom: 1px solid #e2e8f0;
        padding-bottom: 12px;
      }
      .form-group {
        margin-bottom: 16px;
      }
      .form-group label {
        display: block;
        margin-bottom: 6px;
        font-weight: 500;
        color: #374151;
      }
      .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }
      .notification-item {
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        padding: 16px;
        margin-bottom: 16px;
        background: #f8fafc;
      }
      .notification-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
      }
      .notification-title {
        font-weight: 600;
        font-size: 15px;
      }
      .switch {
        position: relative;
        display: inline-block;
        width: 44px;
        height: 24px;
      }
      .switch input { 
        opacity: 0;
        width: 0;
        height: 0;
      }
      .slider {
        position: absolute;
        cursor: pointer;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-color: #ccc;
        transition: .4s;
        border-radius: 24px;
      }
      .slider:before {
        position: absolute;
        content: "";
        height: 18px;
        width: 18px;
        left: 3px;
        bottom: 3px;
        background-color: white;
        transition: .4s;
        border-radius: 50%;
      }
      input:checked + .slider {
        background-color: #2563eb;
      }
      input:checked + .slider:before {
        transform: translateX(20px);
      }
      .config-row {
        display: flex;
        gap: 12px;
        align-items: center;
      }
      .config-row select, .config-row input[type="time"] {
        width: auto;
      }
      
      /* 标签式邮箱输入 */
      .email-tags-container {
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        padding: 8px 12px;
        min-height: 44px;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
        background: #fff;
      }
      .email-tags-container:focus-within {
        border-color: #2563eb;
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
      }
      .email-tag {
        background: #dbeafe;
        color: #1e40af;
        padding: 4px 10px;
        border-radius: 16px;
        font-size: 13px;
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }
      .email-tag.invalid {
        background: #fee2e2;
        color: #991b1b;
      }
      .email-tag .remove {
        cursor: pointer;
        font-weight: bold;
        opacity: 0.6;
      }
      .email-tag .remove:hover {
        opacity: 1;
      }
      .email-input {
        border: none;
        outline: none;
        flex: 1;
        min-width: 120px;
        padding: 4px;
        font-size: 14px;
      }
      .email-input::placeholder {
        color: #94a3b8;
      }
    </style>
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-title">产业互联网内部门户</div>
          <div class="brand-subtitle">Internal Portal</div>
        </div>
        <nav class="nav" id="sidebar-nav">
          <!-- 导航菜单将由 sidebar-nav.js 动态渲染 -->
        </nav>
      </aside>
      <div class="content">
        <header>
          <div class="header-row">
            <div>
              <h1>系统设置</h1>
              <p>配置邮件服务与通知规则。</p>
            </div>
            <div class="user-menu" id="user-menu">
              <button id="user-menu-btn" type="button"></button>
              <div class="user-menu-dropdown" id="user-menu-dropdown">
                <a href="/account">账号管理</a>
                <button id="logout-btn" type="button">退出登录</button>
              </div>
            </div>
          </div>
        </header>
        <main>
          <form id="settings-form">
            <section class="settings-section">
              <h2>邮件服务配置 (SMTP)</h2>
              <div class="form-row">
                <div class="form-group">
                  <label>SMTP Host</label>
                  <input name="smtp_host" placeholder="smtp.example.com" required>
                </div>
                <div class="form-group">
                  <label>Port</label>
                  <input name="smtp_port" type="number" placeholder="465" required>
                </div>
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label>User / Email</label>
                  <input name="smtp_user" required>
                </div>
                <div class="form-group">
                  <label>Password</label>
                  <input name="smtp_pass" type="password" placeholder="Leave empty to keep unchanged">
                </div>
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label>Secure (SSL)</label>
                  <select name="smtp_secure">
                    <option value="true">Yes (SSL/TLS)</option>
                    <option value="false">No (STARTTLS)</option>
                  </select>
                </div>
                <div class="form-group">
                  <label>From Address</label>
                  <input name="smtp_from" placeholder="Optional">
                </div>
              </div>
            </section>

            <section class="settings-section">
              <h2>通知规则</h2>
              
              <div class="notification-item">
                <div class="notification-header">
                  <span class="notification-title">研发提醒：未处理申请</span>
                  <label class="switch">
                    <input type="checkbox" name="notify_dev_enabled">
                    <span class="slider"></span>
                  </label>
                </div>
                <div class="config-row">
                  <select name="notify_dev_freq">
                    <option value="weekly">每周</option>
                    <option value="daily">每天</option>
                  </select>
                  <select name="notify_dev_day">
                    <option value="1">周一</option>
                    <option value="2">周二</option>
                    <option value="3">周三</option>
                    <option value="4">周四</option>
                    <option value="5">周五</option>
                    <option value="6">周六</option>
                    <option value="0">周日</option>
                  </select>
                  <input type="time" name="notify_dev_time" value="10:00">
                </div>
                <p class="muted" style="margin-top: 8px;">发送给所有研发角色，包含上个周期内的待处理申请。</p>
              </div>

              <div class="notification-item">
                <div class="notification-header">
                  <span class="notification-title">服务通知：已办结汇总</span>
                  <label class="switch">
                    <input type="checkbox" name="notify_service_enabled">
                    <span class="slider"></span>
                  </label>
                </div>
                <div class="config-row">
                  <select name="notify_service_freq">
                    <option value="weekly">每周</option>
                    <option value="daily">每天</option>
                  </select>
                  <select name="notify_service_day">
                    <option value="1">周一</option>
                    <option value="2">周二</option>
                    <option value="3">周三</option>
                    <option value="4">周四</option>
                    <option value="5">周五</option>
                    <option value="6">周六</option>
                    <option value="0">周日</option>
                  </select>
                  <input type="time" name="notify_service_time" value="18:00">
                </div>
                <p class="muted" style="margin-top: 8px;">发送给申请人，包含已签发的证书信息。</p>
              </div>

              <div class="notification-item">
                <div class="notification-header">
                  <span class="notification-title">过期预警：关键人员通知</span>
                  <label class="switch">
                    <input type="checkbox" name="notify_exp_enabled">
                    <span class="slider"></span>
                  </label>
                </div>
                <div class="config-row">
                  <select name="notify_exp_freq">
                    <option value="weekly">每周</option>
                    <option value="daily">每天</option>
                    <option value="monthly">每月（1号）</option>
                  </select>
                  <select name="notify_exp_day">
                    <option value="1">周一</option>
                    <option value="2">周二</option>
                    <option value="3">周三</option>
                    <option value="4">周四</option>
                    <option value="5">周五</option>
                    <option value="6">周六</option>
                    <option value="0">周日</option>
                  </select>
                  <input type="time" name="notify_exp_time" value="09:00">
                </div>
                <div style="margin-top: 12px;">
                  <label style="font-size: 13px; display: block; margin-bottom: 6px;">关键人员邮箱（按回车或逗号添加）</label>
                  <div class="email-tags-container" id="email-tags-container">
                    <div id="email-tags-list" style="display: flex; flex-wrap: wrap; gap: 8px;"></div>
                    <input type="text" id="email-tag-input" class="email-input" placeholder="输入邮箱后按回车添加...">
                  </div>
                  <input type="hidden" name="key_personnel_emails" id="key-personnel-emails-hidden">
                  <div id="email-error-msg" style="color: #dc2626; font-size: 12px; margin-top: 4px; display: none;"></div>
                </div>
                <div style="margin-top: 12px;">
                  <label style="font-size: 13px; display: block; margin-bottom: 6px;">提前通知阈值（天）</label>
                  <input name="notify_exp_days" type="number" value="60" placeholder="60" style="width: 150px;">
                </div>
              </div>
            </section>

            <button type="submit" style="min-width: 160px; padding: 12px;">保存设置</button>
            <div id="message" class="muted" style="margin-top: 12px;"></div>
          </form>
        </main>
      </div>
    </div>
    <script src="/version.js"></script>
    <script src="/modal.js"></script>
    <script src="/components/sidebar-nav.js"></script>
    <script src="/settings.js"></script>
  </body>
</html>
