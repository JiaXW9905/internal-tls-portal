<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>内部 TLS 证书门户</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-title">产业互联网内部门户</div>
          <div class="brand-subtitle">Internal Portal</div>
        </div>
        <nav class="nav" id="sidebar-nav">
          <!-- 导航菜单将由 sidebar-nav.js 动态渲染 -->
        </nav>
      </aside>
      <div class="content">
        <header>
          <div class="header-row">
            <div>
              <h1>内部 TLS 证书门户</h1>
              <p>提交申请、跟踪进度并下载已签发证书。</p>
            </div>
            <div class="user-menu" id="user-menu">
              <button id="user-menu-btn" type="button"></button>
              <div class="user-menu-dropdown" id="user-menu-dropdown">
                <a href="/account">账号管理</a>
                <button id="logout-btn" type="button">退出登录</button>
              </div>
            </div>
          </div>
        </header>
        <main>
          <section class="panel">
            <h2>新建申请</h2>
            <form id="request-form">
              <div class="grid">
                <div>
                  <label for="customerName">客户名称</label>
                  <input id="customerName" name="customerName" required />
                </div>
                <div>
                  <label for="productSku">产品</label>
                  <select id="productSku" name="productSku" required>
                    <option value="混合云">混合云</option>
                    <option value="私有云">私有云</option>
                  </select>
                </div>
                <div>
                  <label for="vid">VID</label>
                  <input id="vid" name="vid" required />
                </div>
              </div>
              <div class="field-group">
                <label>申请类型</label>
                <div class="radio-group">
                  <label><input type="radio" name="requestType" value="new" checked> 新办</label>
                  <label><input type="radio" name="requestType" value="renew"> 更新/续期</label>
                  <label><input type="radio" name="requestType" value="delete"> 删除/注销</label>
                </div>
              </div>
              <button type="submit">提交申请</button>
              <div id="request-message" class="muted"></div>
            </form>
          </section>

          <section class="panel">
            <h2>我的申请</h2>
            <p class="muted">加载申请记录并下载已签发证书。</p>
            <button id="load-requests" type="button">加载我的申请</button>
            <div id="lookup-message" class="muted"></div>
            <div class="table-wrap">
              <table class="table" id="requests-table">
                <thead>
                  <tr>
                    <th>客户名称</th>
                    <th>SKU</th>
                    <th>VID</th>
                    <th>类型</th>
                    <th>创建时间</th>
                    <th>状态</th>
                    <th class="col-actions">操作</th>
                  </tr>
                </thead>
                <tbody></tbody>
              </table>
            </div>
          </section>
        </main>
      </div>
    </div>
    <script src="/version.js"></script>
    <script src="/modal.js"></script>
    <script src="/components/sidebar-nav.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
