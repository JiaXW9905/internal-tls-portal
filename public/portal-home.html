<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>产业互联网内部门户</title>
    <link rel="stylesheet" href="/styles.css" />
    <style>
      .portal-home {
        max-width: 1200px;
        margin: 0 auto;
        padding: 40px 20px;
      }

      .portal-header {
        text-align: center;
        margin-bottom: 60px;
      }

      .portal-header h1 {
        font-size: 2.5rem;
        color: #1a1a1a;
        margin-bottom: 10px;
      }

      .portal-header .subtitle {
        font-size: 1.1rem;
        color: #666;
        font-weight: 300;
      }

      .service-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
        gap: 24px;
        margin-top: 40px;
      }

      .service-card {
        background: white;
        border: 1px solid #e5e7eb;
        border-radius: 12px;
        padding: 32px;
        transition: all 0.3s ease;
        cursor: pointer;
        position: relative;
        overflow: hidden;
      }

      .service-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 12px 24px rgba(0, 0, 0, 0.1);
        border-color: #3b82f6;
      }

      .service-card.placeholder {
        background: #f9fafb;
        border-style: dashed;
        cursor: default;
      }

      .service-card.placeholder:hover {
        transform: none;
        box-shadow: none;
        border-color: #e5e7eb;
      }

      .service-icon {
        font-size: 3rem;
        margin-bottom: 16px;
        display: inline-block;
      }

      .service-card h3 {
        font-size: 1.5rem;
        margin-bottom: 12px;
        color: #1a1a1a;
      }

      .service-card p {
        color: #666;
        margin-bottom: 20px;
        line-height: 1.6;
      }

      .service-card .service-link {
        color: #3b82f6;
        text-decoration: none;
        font-weight: 500;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        transition: gap 0.2s ease;
      }

      .service-card:hover .service-link {
        gap: 10px;
      }

      .service-badge {
        position: absolute;
        top: 16px;
        right: 16px;
        background: #10b981;
        color: white;
        padding: 4px 12px;
        border-radius: 12px;
        font-size: 0.75rem;
        font-weight: 600;
      }

      .service-badge.coming-soon {
        background: #94a3b8;
      }

      .welcome-message {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 32px;
        border-radius: 12px;
        margin-bottom: 40px;
      }

      .welcome-message h2 {
        margin-bottom: 8px;
        font-size: 1.8rem;
      }

      .welcome-message p {
        opacity: 0.9;
        font-size: 1.1rem;
      }

      .stats-row {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
        margin-bottom: 40px;
      }

      .stat-card {
        background: white;
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        padding: 20px;
        text-align: center;
      }

      .stat-card .stat-value {
        font-size: 2rem;
        font-weight: 700;
        color: #3b82f6;
        margin-bottom: 8px;
      }

      .stat-card .stat-label {
        color: #666;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-title">产业互联网内部门户</div>
          <div class="brand-subtitle">Internal Portal</div>
        </div>
        <nav class="nav" id="sidebar-nav">
          <!-- 导航菜单将由 sidebar-nav.js 动态渲染 -->
        </nav>
      </aside>
      
      <div class="content">
        <header>
          <div class="header-row">
            <div>
              <h1>服务中心</h1>
              <p>选择您要访问的服务</p>
            </div>
            <div class="user-menu" id="user-menu">
              <button id="user-menu-btn" type="button"></button>
              <div class="user-menu-dropdown" id="user-menu-dropdown">
                <a href="/account">账号管理</a>
                <button id="logout-btn" type="button">退出登录</button>
              </div>
            </div>
          </div>
        </header>

        <main>
          <div class="portal-home">
            <!-- 欢迎信息 -->
            <div class="welcome-message">
              <h2>欢迎回来，<span id="user-name"></span></h2>
              <p>您可以访问以下服务</p>
            </div>

            <!-- 统计信息 -->
            <div class="stats-row" id="stats-row" style="display: none;">
              <!-- 统计卡片将动态加载 -->
            </div>

            <!-- 服务卡片网格 -->
            <div class="service-grid" id="service-grid">
              <!-- 加载中 -->
              <div style="text-align: center; padding: 40px; grid-column: 1 / -1;">
                <p style="color: #666;">加载服务列表...</p>
              </div>
            </div>
          </div>
        </main>
      </div>
    </div>
    
    <script src="/version.js"></script>
    <script src="/modal.js"></script>
    <script src="/components/sidebar-nav.js"></script>
    <script src="/portal-home.js"></script>
  </body>
</html>
