<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>证书总览</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-title">TLS 证书门户</div>
          <div class="brand-subtitle">内部使用</div>
        </div>
        <nav class="nav">
          <a id="nav-requests" href="/">证书申请</a>
          <a id="nav-admin" href="/admin">证书签发</a>
          <a id="nav-overview" href="/overview" class="active">证书总览</a>
          <a id="nav-users" href="/users" style="display: none;">用户与权限</a>
          <a id="nav-settings" href="/settings" style="display: none;">系统设置</a>
        </nav>
      </aside>
      <div class="content">
        <header>
          <div class="header-row">
            <div>
              <h1>证书总览</h1>
              <p>查看所有证书申请和已签发证书。</p>
            </div>
            <div class="user-menu" id="user-menu">
              <button id="user-menu-btn" type="button"></button>
              <div class="user-menu-dropdown" id="user-menu-dropdown">
                <a href="/account">账号管理</a>
                <button id="logout-btn" type="button">退出登录</button>
              </div>
            </div>
          </div>
        </header>
        <main>
          <section class="panel">
            <div class="panel-header">
              <h2>待处理申请</h2>
              <div class="table-toolbar">
                <input id="pending-search" type="search" placeholder="搜索客户名 / SKU / VID / 申请人" />
                <button id="pending-search-btn" type="button">搜索</button>
              </div>
            </div>
            <div class="table-wrap">
              <table class="table" id="pending-table">
                <thead>
                  <tr>
                    <th>客户名称</th>
                    <th>SKU</th>
                    <th>VID</th>
                    <th>类型</th>
                    <th>申请人</th>
                    <th>创建时间</th>
                    <th>状态</th>
                    <th class="col-actions">操作</th>
                  </tr>
                </thead>
                <tbody></tbody>
              </table>
            </div>
            <div id="pending-pagination" class="pagination"></div>
            <div id="pending-message" class="muted"></div>
          </section>

          <section class="panel">
            <div class="panel-header">
              <h2>已签发证书</h2>
              <div class="table-toolbar">
                <input id="issued-search" type="search" placeholder="搜索客户名 / SKU / VID / 申请人" />
                <label class="field">
                  <span>开始日期</span>
                  <input id="issued-start" type="date" />
                </label>
                <label class="field">
                  <span>结束日期</span>
                  <input id="issued-end" type="date" />
                </label>
                <select id="issued-status">
                  <option value="">全部状态</option>
                  <option value="issued">已签发</option>
                  <option value="revoked">证书已撤销</option>
                  <option value="updated">已更新</option>
                  <option value="withdrawn">已工单撤回</option>
                </select>
                <label class="checkbox">
                  <input id="issued-expiring" type="checkbox" />
                  即将过期（60天内）
                </label>
                <button id="issued-search-btn" type="button">搜索</button>
                <button id="issued-export-btn" type="button">导出 CSV</button>
              </div>
            </div>
            <div class="table-wrap">
              <table class="table" id="issued-table">
                <thead>
                  <tr>
                    <th>客户名称</th>
                    <th>SKU</th>
                    <th>VID</th>
                    <th>类型</th>
                    <th>申请人</th>
                    <th>签发时间</th>
                    <th>过期时间</th>
                    <th>状态</th>
                    <th class="col-actions">操作</th>
                  </tr>
                </thead>
                <tbody></tbody>
              </table>
            </div>
            <div id="issued-pagination" class="pagination"></div>
            <div id="issued-message" class="muted"></div>
          </section>
        </main>
      </div>
    </div>
    <script src="/version.js"></script>
    <script src="/modal.js"></script>
    <script src="/overview.js"></script>
  </body>
</html>
